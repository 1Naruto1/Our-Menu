<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="电子厨房" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#fff9f3" />
    <title>电子厨房</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./assets/app-icon-512.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="shell">
      <div class="top-illustration" aria-hidden="true"></div>

      <header class="app-header">
        <div class="brand">
          <img src="./assets/home-badge.png" alt="" />
          <input id="appTitleInput" class="app-title-input" value="电子厨房" aria-label="菜单名称" maxlength="12" />
        </div>
        <div class="header-actions">
          <button id="exportData" class="secondary-button">导出备份</button>
          <label class="secondary-button file-button">
            导入备份
            <input id="importData" type="file" accept="application/json" />
          </label>
        </div>
      </header>

      <main>
        <section class="message-board">
          <div class="message-board-head">
            <div>
              <p class="eyebrow">留言板</p>
              <h2>厨房小纸条</h2>
            </div>
            <button id="openMessageBoard" class="ghost-button">查看全部</button>
          </div>
          <div id="messagePreview" class="message-preview"></div>
        </section>

        <section class="hero-panel">
          <div class="hero-main">
            <div class="card-head">
              <div class="head-title">
                <img src="./assets/reminder-badge.png" alt="" />
                <div>
                  <p class="eyebrow">食材提醒</p>
                  <h2>3天内要用的食材</h2>
                </div>
              </div>
              <button class="ghost-button" data-view="fridge">查看冰箱</button>
            </div>
            <div id="alertRow" class="alert-row"></div>
          </div>

          <aside class="recommend-panel">
            <div class="card-head">
              <div class="head-title">
                <img src="./assets/dinner-badge.png" alt="" />
                <div>
                  <p class="eyebrow">今日推荐</p>
                  <h3 id="heroRecommendTitle">先补一点库存</h3>
                </div>
              </div>
              <button class="ghost-button" data-view="menu">去菜单</button>
            </div>
            <p id="heroRecommendText">添加食材和菜品后，这里会自动推荐优先安排的菜。</p>
            <div id="heroRecommendTags" class="recommend-tags"></div>
          </aside>
        </section>

        <section class="main-tabs" aria-label="主功能切换">
          <button class="is-active" data-view="menu">
            <img src="./assets/menu-tab.png" alt="" />
            菜单
          </button>
          <button data-view="fridge">
            <img src="./assets/fridge-tab.png" alt="" />
            冰箱
          </button>
        </section>

        <section class="view-stage menu-view">
          <div class="view-head">
            <div class="head-title">
              <img src="./assets/menu-tab.png" alt="" />
              <div>
                <p class="eyebrow">菜单页</p>
                <h2>菜品菜单</h2>
              </div>
            </div>
            <div id="menuMeta" class="view-meta"></div>
          </div>

          <section class="toolbar">
            <label class="search-box">
              <span>搜索</span>
              <input id="dishSearch" type="search" placeholder="菜名、食材、标签" autocomplete="off" />
            </label>
            <button id="addDish" class="primary-button">添加菜品</button>
          </section>

          <section class="mode-actions">
            <button class="is-active" data-menu-mode="pinyin">按拼音排序</button>
            <button data-menu-mode="meal">按餐次归类</button>
            <button data-menu-mode="recommend">看推荐</button>
          </section>

          <section id="menuContent" class="content-area"></section>
        </section>

        <section class="view-stage fridge-view is-hidden">
          <div class="view-head">
            <div class="head-title">
              <img src="./assets/fridge-tab.png" alt="" />
              <div>
                <p class="eyebrow">冰箱页</p>
                <h2>食材库存</h2>
              </div>
            </div>
            <div id="fridgeMeta" class="view-meta"></div>
          </div>

          <section class="toolbar">
            <label class="search-box">
              <span>搜索</span>
              <input id="ingredientSearch" type="search" placeholder="食材名、余量、保质期" autocomplete="off" />
            </label>
            <button id="addIngredient" class="primary-button">添加食材</button>
          </section>

          <section class="mode-actions">
            <button class="is-active" data-fridge-mode="expiry">按过期时间排序</button>
            <button data-fridge-mode="name">按名称排序</button>
            <button data-fridge-mode="urgent">只看快过期</button>
          </section>

          <section id="fridgeContent" class="fridge-grid"></section>
        </section>

        <section class="view-stage records-stage">
          <div class="view-head">
            <div>
              <p class="eyebrow">打卡记录</p>
              <h2>三餐记录</h2>
            </div>
            <label class="date-field">
              <span>记录日期</span>
              <input id="recordDate" type="date" />
            </label>
          </div>
          <div id="recordsList" class="records-list"></div>
        </section>
      </main>
    </div>

    <dialog id="dishDialog" class="app-dialog">
      <form id="dishForm" method="dialog">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">菜品资料</p>
            <h2 id="dishDialogTitle">添加菜品</h2>
          </div>
          <button type="button" id="closeDishDialog" class="icon-button" aria-label="关闭">×</button>
        </div>

        <input id="dishId" type="hidden" />

        <label class="image-picker">
          <img id="dishImagePreview" alt="" />
          <span id="dishImageHint">选择菜品图片</span>
          <input id="dishImage" type="file" accept="image/*" />
        </label>

        <label class="field">
          <span>菜名</span>
          <input id="dishName" required placeholder="例如：番茄炒蛋" />
        </label>

        <fieldset class="meal-field">
          <legend>适合餐次，可多选</legend>
          <label><input type="checkbox" name="dishMealType" value="breakfast" />早餐</label>
          <label><input type="checkbox" name="dishMealType" value="lunch" checked />午餐</label>
          <label><input type="checkbox" name="dishMealType" value="dinner" checked />晚餐</label>
        </fieldset>

        <label class="field">
          <span>食材与用量</span>
          <textarea id="dishIngredients" rows="4" placeholder="每行一个，例如：&#10;番茄 2 个&#10;鸡蛋 3 个"></textarea>
        </label>

        <label class="field">
          <span>分类 / 标签</span>
          <input id="dishCategory" placeholder="例如：家常菜、快手、清淡" />
        </label>

        <label class="field">
          <span>备注</span>
          <textarea id="dishNote" rows="3" placeholder="口味、做法提示、家人偏好等"></textarea>
        </label>

        <div class="dialog-actions">
          <button id="deleteDish" type="button" class="danger-button is-hidden">删除</button>
          <button type="submit" class="primary-button">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="ingredientDialog" class="app-dialog">
      <form id="ingredientForm" method="dialog">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">冰箱食材</p>
            <h2 id="ingredientDialogTitle">添加食材</h2>
          </div>
          <button type="button" id="closeIngredientDialog" class="icon-button" aria-label="关闭">×</button>
        </div>

        <input id="ingredientId" type="hidden" />

        <label class="image-picker">
          <img id="ingredientImagePreview" alt="" />
          <span id="ingredientImageHint">选择食材图片</span>
          <input id="ingredientImage" type="file" accept="image/*" />
        </label>

        <label class="field">
          <span>食材名</span>
          <input id="ingredientName" required placeholder="例如：青菜" />
        </label>

        <div class="field-grid">
          <label class="field">
            <span>余量</span>
            <input id="ingredientQuantity" inputmode="decimal" placeholder="例如：1" />
          </label>
          <label class="field">
            <span>单位</span>
            <input id="ingredientUnit" placeholder="把 / 个 / 盒" />
          </label>
          <label class="field">
            <span>保质期</span>
            <input id="ingredientExpiry" type="date" />
          </label>
        </div>

        <label class="field">
          <span>备注</span>
          <textarea id="ingredientNote" rows="3" placeholder="购买位置、冷藏方式、需要优先消耗等"></textarea>
        </label>

        <div class="dialog-actions">
          <button id="deleteIngredient" type="button" class="danger-button is-hidden">删除</button>
          <button type="submit" class="primary-button">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="checkinDialog" class="app-dialog checkin-dialog">
      <form id="checkinForm" method="dialog">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">三餐打卡</p>
            <h2 id="checkinTitle">记录这顿饭</h2>
          </div>
          <button type="button" id="closeCheckinDialog" class="icon-button" aria-label="关闭">×</button>
        </div>

        <label class="date-field wide">
          <span>打卡日期</span>
          <input id="checkinDate" type="date" />
        </label>

        <input id="checkinRating" type="hidden" value="5" />
        <input id="checkinCook" type="hidden" value="together" />

        <div class="rating-field">
          <span>评分</span>
          <div class="star-picker" aria-label="五颗星评分">
            <button type="button" data-star="1">★</button>
            <button type="button" data-star="2">★</button>
            <button type="button" data-star="3">★</button>
            <button type="button" data-star="4">★</button>
            <button type="button" data-star="5">★</button>
          </div>
        </div>

        <div class="cook-picker">
          <span>这顿饭是谁做的？</span>
          <button type="button" data-cook="rabbit"><img src="./assets/rabbit-spatula.png" alt="" />兔兔</button>
          <button type="button" data-cook="tiger"><img src="./assets/tiger-chef.png" alt="" />虎虎</button>
          <button type="button" data-cook="together">一起</button>
        </div>

        <label class="photo-picker">
          <span>添加本次打卡图片</span>
          <input id="checkinPhotos" type="file" accept="image/*" multiple />
        </label>
        <div id="checkinPhotoPreview" class="photo-preview"></div>

        <label class="field">
          <span>评论</span>
          <textarea id="checkinComment" rows="4" placeholder="例如：今天火候刚好，下次可以少放一点盐"></textarea>
        </label>

        <div class="dialog-actions">
          <button type="submit" class="primary-button">保存打卡</button>
        </div>
      </form>
    </dialog>

    <dialog id="recordDetailDialog" class="app-dialog">
      <form method="dialog">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">打卡详情</p>
            <h2 id="recordDetailTitle">本次打卡</h2>
          </div>
          <button type="button" id="closeRecordDetailDialog" class="icon-button" aria-label="关闭">×</button>
        </div>
        <div id="recordDetailContent" class="record-detail-content"></div>
      </form>
    </dialog>

    <dialog id="messageDialog" class="app-dialog message-dialog">
      <form id="messageForm" method="dialog">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">留言历史</p>
            <h2>厨房小纸条</h2>
          </div>
          <button type="button" id="closeMessageDialog" class="icon-button" aria-label="关闭">×</button>
        </div>

        <div id="messageHistory" class="message-history"></div>

        <input id="replyToMessage" type="hidden" />
        <input id="editingMessageId" type="hidden" />
        <div id="replyHint" class="reply-hint is-hidden"></div>

        <div class="cook-picker message-author">
          <span>谁来留言？</span>
          <button type="button" data-message-author="rabbit"><img src="./assets/rabbit-spatula.png" alt="" />兔兔</button>
          <button type="button" data-message-author="tiger"><img src="./assets/tiger-chef.png" alt="" />虎虎</button>
        </div>

        <label class="field">
          <span>留言内容</span>
          <textarea id="messageText" rows="3" placeholder="例如：青菜快到期了，今晚做掉吧"></textarea>
        </label>

        <div class="dialog-actions">
          <button id="cancelReply" type="button" class="secondary-button is-hidden">取消回复</button>
          <button id="saveMessageButton" type="submit" class="primary-button">发布留言</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./app.js" type="module"></script>
  </body>
</html>
